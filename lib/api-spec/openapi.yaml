openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Gain Discipline API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: aptitude
    description: Aptitude quiz operations
  - name: coding
    description: Coding challenge operations
  - name: user
    description: User profile and stats operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get user profile with stats
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /user/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [user]
      summary: Get leaderboard
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaderboard:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaderboardEntry"
                required:
                  - leaderboard

  /aptitude/topics:
    get:
      operationId: getAptitudeTopics
      tags: [aptitude]
      summary: Get all aptitude topics with user progress
      responses:
        "200":
          description: Aptitude topics
          content:
            application/json:
              schema:
                type: object
                properties:
                  topics:
                    type: array
                    items:
                      $ref: "#/components/schemas/AptitudeTopic"
                required:
                  - topics

  /aptitude/questions:
    get:
      operationId: getAptitudeQuestions
      tags: [aptitude]
      summary: Get questions for a topic and level
      parameters:
        - name: topic
          in: query
          required: true
          schema:
            type: string
        - name: level
          in: query
          required: true
          schema:
            type: string
            enum: [simple, hard, difficult]
      responses:
        "200":
          description: Questions list
          content:
            application/json:
              schema:
                type: object
                properties:
                  questions:
                    type: array
                    items:
                      $ref: "#/components/schemas/AptitudeQuestion"
                required:
                  - questions

  /aptitude/submit:
    post:
      operationId: submitAptitudeQuiz
      tags: [aptitude]
      summary: Submit a quiz attempt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAptitudeQuizBody"
      responses:
        "200":
          description: Quiz result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"
        "401":
          description: Unauthorized

  /aptitude/streak:
    get:
      operationId: getAptitudeStreak
      tags: [aptitude]
      summary: Get aptitude streak info
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Streak info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakInfo"
        "401":
          description: Unauthorized

  /coding/topics:
    get:
      operationId: getCodingTopics
      tags: [coding]
      summary: Get coding topics with problems
      responses:
        "200":
          description: Coding topics
          content:
            application/json:
              schema:
                type: object
                properties:
                  topics:
                    type: array
                    items:
                      $ref: "#/components/schemas/CodingTopic"
                required:
                  - topics

  /coding/problems:
    get:
      operationId: getCodingProblems
      tags: [coding]
      summary: Get coding problems for topic and level
      parameters:
        - name: topic
          in: query
          required: true
          schema:
            type: string
        - name: level
          in: query
          required: true
          schema:
            type: string
            enum: [simple, hard, difficult]
      responses:
        "200":
          description: Problems list
          content:
            application/json:
              schema:
                type: object
                properties:
                  problems:
                    type: array
                    items:
                      $ref: "#/components/schemas/CodingProblem"
                required:
                  - problems

  /coding/daily:
    get:
      operationId: getDailyProblem
      tags: [coding]
      summary: Get problem of the day
      responses:
        "200":
          description: Daily problem
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodingProblem"

  /coding/submit:
    post:
      operationId: submitCodingProblem
      tags: [coding]
      summary: Submit a coding solution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitCodingBody"
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodingResult"
        "401":
          description: Unauthorized

  /coding/streak:
    get:
      operationId: getCodingStreak
      tags: [coding]
      summary: Get coding streak info
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Coding streak info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakInfo"
        "401":
          description: Unauthorized

  /user/redeem:
    post:
      operationId: redeemReward
      tags: [user]
      summary: Redeem points for a reward
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemRewardBody"
      responses:
        "200":
          description: Redemption result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemResult"
        "401":
          description: Unauthorized

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GetCurrentAuthUserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        isAuthenticated:
          type: boolean
      required:
        - isAuthenticated

    AuthUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        profileImage:
          type: string
      required:
        - id
        - username

    UserProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        firstName:
          type: string
        profileImage:
          type: string
        totalPoints:
          type: integer
        aptitudeStreak:
          type: integer
        codingStreak:
          type: integer
        longestAptitudeStreak:
          type: integer
        longestCodingStreak:
          type: integer
        problemsAttempted:
          type: integer
        problemsSolved:
          type: integer
        accuracy:
          type: number
        badges:
          type: array
          items:
            type: string
        heatmapData:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapEntry"
      required:
        - id
        - username
        - totalPoints
        - aptitudeStreak
        - codingStreak
        - longestAptitudeStreak
        - longestCodingStreak
        - problemsAttempted
        - problemsSolved
        - accuracy
        - badges
        - heatmapData

    HeatmapEntry:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
      required:
        - date
        - count

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        username:
          type: string
        profileImage:
          type: string
        totalPoints:
          type: integer
        aptitudeStreak:
          type: integer
        codingStreak:
          type: integer
      required:
        - rank
        - userId
        - username
        - totalPoints
        - aptitudeStreak
        - codingStreak

    AptitudeTopic:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        totalQuestions:
          type: integer
        solvedQuestions:
          type: integer
        available:
          type: boolean
      required:
        - id
        - name
        - totalQuestions
        - solvedQuestions
        - available

    AptitudeQuestion:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: string
        explanation:
          type: string
        topic:
          type: string
        level:
          type: string
      required:
        - id
        - question
        - options
        - correctAnswer
        - explanation
        - topic
        - level

    SubmitAptitudeQuizBody:
      type: object
      properties:
        topic:
          type: string
        level:
          type: string
        answers:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: string
              selectedAnswer:
                type: string
            required:
              - questionId
              - selectedAnswer
      required:
        - topic
        - level
        - answers

    QuizResult:
      type: object
      properties:
        score:
          type: integer
        total:
          type: integer
        pointsEarned:
          type: integer
        streakBonus:
          type: boolean
        message:
          type: string
      required:
        - score
        - total
        - pointsEarned
        - streakBonus
        - message

    StreakInfo:
      type: object
      properties:
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        lastActivity:
          type: string
        heatmapData:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapEntry"
      required:
        - currentStreak
        - longestStreak
        - heatmapData

    CodingTopic:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        totalProblems:
          type: integer
        solvedProblems:
          type: integer
        available:
          type: boolean
      required:
        - id
        - name
        - totalProblems
        - solvedProblems
        - available

    CodingProblem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        inputFormat:
          type: string
        outputFormat:
          type: string
        constraints:
          type: string
        sampleInput:
          type: string
        sampleOutput:
          type: string
        topic:
          type: string
        level:
          type: string
        isDaily:
          type: boolean
      required:
        - id
        - title
        - description
        - inputFormat
        - outputFormat
        - constraints
        - sampleInput
        - sampleOutput
        - topic
        - level
        - isDaily

    SubmitCodingBody:
      type: object
      properties:
        problemId:
          type: string
        language:
          type: string
          enum: [javascript, python, java]
        code:
          type: string
      required:
        - problemId
        - language
        - code

    CodingResult:
      type: object
      properties:
        passed:
          type: boolean
        testsPassed:
          type: integer
        testsTotal:
          type: integer
        pointsEarned:
          type: integer
        output:
          type: string
        error:
          type: string
      required:
        - passed
        - testsPassed
        - testsTotal
        - pointsEarned

    RedeemRewardBody:
      type: object
      properties:
        rewardId:
          type: string
      required:
        - rewardId

    RedeemResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        newBalance:
          type: integer
        badge:
          type: string
      required:
        - success
        - message
        - newBalance
