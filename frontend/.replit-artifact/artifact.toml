kind = "web"
previewPath = "/"
title = "Gain Discipline"
version = "1.0.0"
id = "artifacts/gain-discipline"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19357

[services.development]
run = "pnpm --filter @workspace/gain-discipline run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gain-discipline", "run", "build" ]
publicDir = "artifacts/gain-discipline/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19357"
BASE_PATH = "/"
